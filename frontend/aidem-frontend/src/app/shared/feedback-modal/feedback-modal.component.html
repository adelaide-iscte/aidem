<div class="modal-backdrop">

  <div class="feedback-modal" *ngIf="!showSuccess">

    <h2>Conseguiu finalizar a atividade?</h2>

    <div class="feedback-row">

      <button class="emoji-option" [class.selected]="selectedCompletion === 'yes'" (click)="selectCompletion('yes')">
        <img src="/icons/yes_face.png" />
        <span>Sim</span>
      </button>

      <button class="emoji-option" [class.selected]="selectedCompletion === 'almost'" (click)="selectCompletion('almost')">
        <img src="/icons/almost_face.png" />
        <span>Quase</span>
      </button>

      <button class="emoji-option" [class.selected]="selectedCompletion === 'no'" (click)="selectCompletion('no')">
        <img src="/icons/no_face.png" />
        <span>Não</span>
      </button>

    </div>

    <h2>Como classifica a dificuldade da atividade?</h2>

    <div class="feedback-row">

      <button class="emoji-option" [class.selected]="selectedDifficulty === 'easy'" (click)="selectDifficulty('easy')">
        <img src="/icons/easy_face.png" />
        <span>Fácil</span>
      </button>

      <button class="emoji-option" [class.selected]="selectedDifficulty === 'medium'" (click)="selectDifficulty('medium')">
        <img src="/icons/medium_face.png" />
        <span>Média</span>
      </button>

      <button class="emoji-option" [class.selected]="selectedDifficulty === 'hard'" (click)="selectDifficulty('hard')">
        <img src="/icons/hard_face.png" />
        <span>Difícil</span>
      </button>

    </div>

    <button
      class="finish-button"
      [class.enabled]="selectedCompletion && selectedDifficulty"
      [disabled]="!selectedCompletion || !selectedDifficulty"
      (click)="submit()">
      Concluir
    </button>

    <button class="cancel-button" (click)="closeModal()">Cancelar</button>

  </div>

  <div class="success-modal" *ngIf="showSuccess">
    <h2>Muito bem!</h2>

    <button class="continue-button" (click)="closeModal()">
      Continuar
    </button>
  </div>

</div>
