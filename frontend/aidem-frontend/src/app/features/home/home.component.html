<div class="home-page">
  <header class="header">
    <img src="/icons/menu.svg" class="menu-icon" (click)="openSideMenu()" />

    <div class="top-icons">
      <img
        src="/icons/bell.svg"
        class="top-icon"
        (click)="toggleNotifications()"
      />
      <img src="/icons/professional.svg" class="avatar" />
    </div>
  </header>

  <main class="content">
    <div class="accessibility-row">
      <button
        class="accessibility-button"
        type="button"
        aria-label="Ler conteúdo da página inicial em voz alta">

        <img
          src="/icons/volume-blue.svg"
          class="accessibility-icon"
          alt="">

        <span>Ouvir página</span>

      </button>
    </div>

    <section class="hero-card">
      <div class="patient-avatar">
        <img src="/icons/generic_user.svg" alt="Utente" />
      </div>

      <div class="hero-info">
        <h1>Bom dia {{ caregiverFirstName }}!</h1>

        <div class="patient-meta">
          <img src="/icons/patient_card.svg" alt="" />
          <span>{{ patient.code }}</span>
          <span class="dot">•</span>
          <span>{{ patientDisplayName }}</span>
        </div>

        <p>
          Hoje o seu foco é
          <strong>equilíbrio e mobilidade.</strong>
        </p>
      </div>

      <img src="/icons/care-hands-blue.png" class="hero-watermark" />

      <button class="hero-button" (click)="openActivities.emit()">
        Leve-me lá!
      </button>
    </section>

    <section class="days">
      <div
        class="day-card"
        *ngFor="let day of days"
        [class.active]="day.isToday">

        <span>{{ day.label }}</span>
        <strong>{{ day.dayNumber }}</strong>
      </div>
    </section>

    <section class="today-section">
      <h2>Atividades para a sessão de hoje</h2>

      <app-loading-spinner
        *ngIf="isLoadingActivities"
        message="A preparar os exercícios de hoje...">
      </app-loading-spinner>

      <p
        class="empty-activities"
        *ngIf="!isLoadingActivities && todayActivities.length === 0">
        Ainda não existem exercícios para hoje.
      </p>

      <div
        class="activity-row"
        *ngFor="let activity of todayActivities">

        <img
          src="/icons/generic_exercise.svg"
          class="activity-image">

        <span class="activity-name">
      {{ activity.title }}
    </span>

        <img
          *ngIf="activity.status === 'COMPLETED' || activity.status === 'SKIPPED'"
          src="/icons/check_completed.svg"
          class="tick-icon">

        <img
          *ngIf="activity.status !== 'COMPLETED'"
          src="/icons/check_incompleted.svg"
          class="tick-icon">

      </div>
    </section>

  </main>

  <footer class="bottom-nav">
    <div (click)="openActivities.emit()">
      <img src="/icons/activities.svg" />
      <span>Atividades</span>
    </div>

    <div class="active">
      <img src="/icons/Home.svg" />
      <span>Início</span>
    </div>

    <div (click)="openProfile.emit()">
      <img src="/icons/person.svg" />
      <span>Perfil</span>
    </div>
  </footer>
</div>
<app-notifications-popover
  *ngIf="showNotifications"
  (close)="closeNotifications()">
</app-notifications-popover>
<app-side-menu
  *ngIf="showSideMenu"
  (close)="closeSideMenu()"
  (changePatient)="openPatients.emit(); closeSideMenu()"
  (openChat)="openChat.emit(); closeSideMenu()">
</app-side-menu>
