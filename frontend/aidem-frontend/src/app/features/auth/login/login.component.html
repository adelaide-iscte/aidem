<div class="tablet-frame">
  <main class="login-container">
    <h1>Entrar</h1>

    <form class="login-form" (ngSubmit)="login()">
      <div class="input-wrapper">
        <img src="/icons/Mail.svg" class="icon">
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Insira o seu email"
          required
        />
      </div>

      <div class="input-wrapper" [class.input-error]="errorMessage">
        <img src="/icons/Lock.svg" class="icon">

        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          placeholder="Insira a sua palavra-chave"
          required
        />

        <button type="button" class="eye-button" (click)="togglePassword()">
          <img
            [src]="showPassword
        ? '/icons/Eye off.svg'
        : '/icons/Eye.svg'"
            class="eye-icon"
          />
        </button>
      </div>

      <p class="password-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>


      <button type="submit" class="login-button" [disabled]="isLoading">
        {{ isLoading ? 'A entrar...' : 'Entrar' }}
      </button>
    </form>

    <div class="divider">
      <span></span>
      <p>OU</p>
      <span></span>
    </div>

    <div class="social-buttons">
      <button>
        <img src="/icons/Google.svg" class="social-icon">
        Use a sua Conta Google
      </button>

    </div>
  </main>
</div>
